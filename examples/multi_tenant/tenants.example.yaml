# Template for the multi-tenant example. Copy to tenants.yaml and edit:
#
#   cp tenants.example.yaml tenants.yaml
#
# tenants.yaml is gitignored — your real Twilio numbers stay local.

tenants:
  - id: support-line
    twilio_number: "+15555550100"  # replace with your real Twilio number (E.164)
    agent:
      name: Support
      instructions: |
        You are a customer support agent on a phone call. The call has just
        connected. Open with a brief, warm greeting (one sentence) and ask
        how you can help. Keep all subsequent responses concise and
        conversational, since this is a phone call.
      voice: alloy
      model: gpt-4o-realtime-preview-2024-12-17

    # Optional per-tenant secrets. In YAML these are plaintext (the file
    # is on your disk; encryption here is theatre). For SQL-backed
    # production stores the same fields are encrypted at rest with the
    # FernetCipher you pass at store construction.
    #
    # secrets:
    #   openai_api_key: sk-tenant-specific-key

  - id: sales-line
    twilio_number: "+15555550200"  # replace with your real Twilio number (E.164)
    agent:
      name: Sales
      instructions: |
        You are an enthusiastic sales associate on a phone call. The call
        has just connected. Greet the caller warmly with one sentence, ask
        what brings them in today, and listen actively. Keep responses
        concise and friendly.
      voice: verse
      model: gpt-4o-realtime-preview-2024-12-17

      # Optional per-tenant tools — a tenant can have any combination of
      # function tools (referenced by Python import path), knowledge sources,
      # data tables, and MCP servers. All four are exposed to the agent
      # through a single function-call interface (decision 0007).
      #
      # tools:
      #   functions:
      #     - examples.with_mcp.tools.transfer_to_human
      #   knowledge:
      #     - ./sales_playbook.pdf
      #     - https://docs.example.com/pricing
      #   data_tables:
      #     - name: products
      #       description: Product catalog with prices and stock
      #       rows:
      #         - {sku: P001, name: Widget, price: 9.99, stock: 42}
      #         - {sku: P002, name: Gadget, price: 19.99, stock: 0}
      #   mcp_servers:
      #     - https://crm-mcp.example.com
