repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        # We run black for formatting; ruff-format is included for parity checks
        # in case a contributor prefers ruff. Both should agree on style.
        stages: [manual]

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^oratium/
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - pydantic>=2.9
          - fastapi>=0.115
          - sqlalchemy[asyncio]>=2.0
          - alembic>=1.14
          - cryptography>=43
          - redis>=5.2
          - types-pyyaml>=6.0
          - types-requests
