# Alembic configuration. Schema is in oratium/storage/_sql_models.py;
# migrations live inside the package so they ship with the wheel.

[alembic]
script_location = oratium/storage/migrations
prepend_sys_path = .
sqlalchemy.url =

# Use the env's DATABASE_URL at runtime via env.py — no hardcoded URL.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
